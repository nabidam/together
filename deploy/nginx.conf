# Replace together.example.com and the certificate paths before enabling.
# TLS certificates can be managed with Certbot or your preferred ACME client.

map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

server {
	listen 80;
	listen [::]:80;
	server_name together.example.com;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	server_name together.example.com;

	ssl_certificate /etc/letsencrypt/live/together.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/together.example.com/privkey.pem;

	server_tokens off;
	client_max_body_size 20g;
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "DENY" always;
	add_header Referrer-Policy "no-referrer" always;

	location / {
		proxy_pass http://127.0.0.1:8080;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
		proxy_request_buffering off;
	}
}
